<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Rose Icon for Marina Flores -->
  <defs>
    <linearGradient id="roseGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C4253A"/>
      <stop offset="50%" stop-color="#9C1C2B"/>
      <stop offset="100%" stop-color="#6B0F1A"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3d1f"/>
      <stop offset="100%" stop-color="#0d1f0f"/>
    </linearGradient>
  </defs>
  
  <!-- Outer petals -->
  <ellipse cx="50" cy="45" rx="18" ry="22" fill="url(#roseGrad)" transform="rotate(-20 50 45)"/>
  <ellipse cx="50" cy="45" rx="18" ry="22" fill="url(#roseGrad)" transform="rotate(20 50 45)"/>
  <ellipse cx="50" cy="45" rx="16" ry="20" fill="url(#roseGrad)" transform="rotate(-40 50 45)"/>
  <ellipse cx="50" cy="45" rx="16" ry="20" fill="url(#roseGrad)" transform="rotate(40 50 45)"/>
  
  <!-- Inner petals -->
  <ellipse cx="50" cy="48" rx="12" ry="16" fill="#D6283E" transform="rotate(-10 50 48)"/>
  <ellipse cx="50" cy="48" rx="12" ry="16" fill="#D6283E" transform="rotate(10 50 48)"/>
  
  <!-- Center -->
  <ellipse cx="50" cy="50" rx="8" ry="10" fill="#E84A5F"/>
  
  <!-- Leaves -->
  <path d="M35 65 Q25 55 35 45 Q40 55 35 65" fill="url(#leafGrad)"/>
  <path d="M65 65 Q75 55 65 45 Q60 55 65 65" fill="url(#leafGrad)"/>
  
  <!-- Stem -->
  <path d="M50 60 Q50 75 48 85" stroke="#1a3d1f" stroke-width="3" stroke-linecap="round"/>
</svg>
